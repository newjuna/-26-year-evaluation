<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D1B36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>관리감독자 반기평가</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 앱 헤더 (항상 고정) ── -->
<header class="app-header" id="app-header">
  <div class="header-left">
    <span class="logo">daiso</span>
  </div>
  <div class="header-title" id="header-title">반기 업무수행 평가</div>
  <div class="header-right" id="header-right"></div>
</header>

<!-- ── 진행률 바 (평가 중만 표시) ── -->
<div class="top-progress-wrap" id="top-progress-wrap" style="display:none">
  <div class="top-progress-bar" id="top-progress-bar"></div>
  <div class="top-progress-label" id="top-progress-label"></div>
</div>

<!-- ════════════════════════════
     화면 1: 정보 입력
════════════════════════════ -->
<div id="screen-info" class="screen active">

  <!-- 상단 안내 배너 -->
  <div class="info-banner">
    <div class="info-banner-title">2026년 상반기 평가</div>
    <div class="info-banner-sub">매장 정보와 본인 정보를 입력해주세요</div>
  </div>

  <div class="form-card">

    <div class="form-section-label">📍 매장 위치</div>

    <div class="form-group">
      <label>영업본부</label>
      <div class="select-wrap">
        <select id="sel-hq"><option value="">선택</option></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
    <div class="form-group">
      <label>부서명</label>
      <div class="select-wrap">
        <select id="sel-dept" disabled><option value="">영업본부 선택 후</option></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
    <div class="form-group">
      <label>팀명</label>
      <div class="select-wrap">
        <select id="sel-team" disabled><option value="">부서 선택 후</option></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
    <div class="form-group">
      <label>매장명</label>
      <div class="select-wrap">
        <select id="sel-store" disabled><option value="">팀 선택 후</option></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>

    <div class="form-divider"></div>
    <div class="form-section-label">👤 관리감독자 정보</div>

    <div class="form-group">
      <label>성명</label>
      <input type="text" id="inp-name" placeholder="이름을 입력하세요"
             autocomplete="name" inputmode="text">
    </div>
    <div class="form-group">
      <label>사번</label>
      <input type="text" id="inp-empid" placeholder="AD + 숫자 (예: AD12345)"
             autocomplete="off" inputmode="text" style="text-transform:uppercase">
    </div>

    <div id="duplicate-msg" class="alert-box" style="display:none"></div>

  </div>

  <!-- 하단 고정 버튼 -->
  <div class="bottom-bar">
    <button class="btn btn-primary btn-lg" id="btn-start" disabled>
      평가 시작하기
      <span class="btn-arrow">→</span>
    </button>
  </div>
</div>

<!-- ════════════════════════════
     화면 2: 평가 (카드 1장씩)
════════════════════════════ -->
<div id="screen-eval" class="screen">

  <!-- 평가 카드 슬라이더 -->
  <div class="eval-slider-wrap" id="eval-slider-wrap">
    <!-- JS로 카드 생성 -->
  </div>

  <!-- 하단 고정 영역 -->
  <div class="bottom-bar eval-bottom">
    <button class="btn btn-gray btn-half" id="btn-prev" style="display:none">← 이전</button>
    <button class="btn btn-primary btn-half" id="btn-next">다음 →</button>
  </div>
</div>

<!-- ════════════════════════════
     화면 3: 서명
════════════════════════════ -->
<div id="screen-sign" class="screen">
  <div class="form-card" style="margin-bottom:100px">
    <div class="sign-title">✍️ 서명해주세요</div>
    <div class="sign-subtitle">아래 박스에 서명 후 제출 버튼을 눌러주세요</div>
    <div class="sign-wrap" id="sign-wrap">
      <canvas id="signCanvas"></canvas>
      <div class="sign-hint" id="sign-hint">여기에 서명하세요</div>
    </div>
    <button class="btn btn-gray-outline" onclick="clearSign()">🔄 다시 서명</button>
    <div id="sign-required-msg" class="alert-box" style="display:none;margin-top:12px">서명이 필요합니다.</div>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-gray btn-half" onclick="showScreen('screen-eval');scrollToLastItem()">← 이전</button>
    <button class="btn btn-primary btn-half" id="btn-submit">제출하기</button>
  </div>
</div>

<!-- ════════════════════════════
     화면 4: 완료
════════════════════════════ -->
<div id="screen-done" class="screen">
  <div class="done-wrap">
    <div class="done-emoji">🎉</div>
    <div class="done-title">제출 완료</div>

    <div class="score-circle">
      <div class="score-num" id="res-score">--</div>
      <div class="score-unit">점</div>
    </div>
    <div class="result-grade" id="res-grade">--</div>
    <div class="result-rawscore" id="res-info"></div>

    <div class="pdf-status-box" id="pdf-status-box">
      <div class="pdf-waiting">
        <span class="spinner"></span>
        <span>결과서 PDF 생성 중...</span>
      </div>
      <div style="font-size:12px;color:var(--gray-500);margin-top:6px">잠시 후 자동으로 링크가 나타납니다</div>
    </div>

    <button class="btn btn-outline" onclick="location.reload()" style="margin-top:8px">처음으로 돌아가기</button>
  </div>
</div>

<!-- ════════════════════════════
     로딩 오버레이
════════════════════════════ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-card">
    <div class="loading-title">제출 중...</div>
    <div class="loading-steps">
      <div class="loading-step" id="step-0"><span class="step-icon">🔍</span><span>중복 확인</span></div>
      <div class="loading-step" id="step-1"><span class="step-icon">📤</span><span>서버 전송</span></div>
      <div class="loading-step" id="step-2"><span class="step-icon">💾</span><span>데이터 저장</span></div>
      <div class="loading-step" id="step-3"><span class="step-icon">⏳</span><span>완료 처리</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
