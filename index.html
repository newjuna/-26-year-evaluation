<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D1B36">
  <title>관리감독자 반기평가</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 앱 헤더 -->
<header class="app-header">
  <div class="logo">daiso</div>
  <div class="title">관리감독자 반기 업무수행 평가</div>
</header>

<!-- ══════════════════════════════
     화면 1: 정보 입력
════════════════════════════════ -->
<div id="screen-info" class="screen active">
  <div class="card">
    <div class="section-title">📋 기본 정보 입력</div>

    <div class="form-group">
      <label>영업본부</label>
      <select id="sel-hq">
        <option value="">선택하세요</option>
      </select>
    </div>
    <div class="form-group">
      <label>부서명</label>
      <select id="sel-dept" disabled>
        <option value="">영업본부를 먼저 선택하세요</option>
      </select>
    </div>
    <div class="form-group">
      <label>팀명</label>
      <select id="sel-team" disabled>
        <option value="">부서를 먼저 선택하세요</option>
      </select>
    </div>
    <div class="form-group">
      <label>매장명</label>
      <select id="sel-store" disabled>
        <option value="">팀을 먼저 선택하세요</option>
      </select>
    </div>
    <div class="form-group">
      <label>관리감독자 성명</label>
      <input type="text" id="inp-name" placeholder="성명을 입력하세요" autocomplete="name">
    </div>
    <div class="form-group">
      <label>사번 <span style="color:var(--gray-500);font-weight:400">(AD + 숫자)</span></label>
      <input type="text" id="inp-empid" placeholder="예) AD12345" autocomplete="off"
             inputmode="text" style="text-transform:uppercase">
    </div>

    <div id="duplicate-msg" style="display:none;color:var(--red);font-size:13px;margin-bottom:12px;padding:10px;background:var(--red-soft);border-radius:8px;"></div>

    <button class="btn btn-primary" id="btn-start" disabled>평가 시작하기 →</button>
  </div>
</div>

<!-- ══════════════════════════════
     화면 2: 평가 항목
════════════════════════════════ -->
<div id="screen-eval" class="screen">
  <div id="eval-items-container"></div>

  <!-- 서명 -->
  <div class="card" style="margin-top:0">
    <div class="section-title">✍️ 서명</div>
    <div class="sign-wrap">
      <canvas id="signCanvas"></canvas>
    </div>
    <button class="sign-clear" onclick="clearSign()">다시 서명</button>
    <div id="sign-required-msg" style="display:none;color:var(--red);font-size:13px;margin-top:8px;">서명이 필요합니다.</div>
  </div>

  <div style="margin:0 16px 16px">
    <button class="btn btn-primary" id="btn-submit">제출하기</button>
    <p id="eval-required-msg" style="display:none;color:var(--red);font-size:13px;margin-top:10px;text-align:center;">
      모든 평가 항목을 선택해주세요.
    </p>
  </div>
</div>

<!-- ══════════════════════════════
     화면 3: 완료
════════════════════════════════ -->
<div id="screen-done" class="screen">
  <div class="result-card">
    <div style="font-size:32px;margin-bottom:8px;">🎉</div>
    <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px;">평가 제출 완료</div>
    <div class="result-score" id="res-score">--</div>
    <div style="font-size:14px;color:var(--gray-500);margin-bottom:8px;">점</div>
    <div class="result-grade" id="res-grade">--</div>
    <div class="result-info" id="res-info"></div>

    <div class="pdf-link-box" id="pdf-status-box">
      <div style="color:var(--gray-500)">📄 결과서 PDF 생성 중...</div>
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px;">잠시 후 자동으로 링크가 표시됩니다</div>
    </div>

    <button class="btn btn-outline" onclick="location.reload()">처음으로 돌아가기</button>
  </div>
</div>

<!-- ══════════════════════════════
     로딩 오버레이
════════════════════════════════ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-title">제출 처리 중...</div>
  <div class="loading-steps" id="loading-steps">
    <div class="loading-step" id="step-0"><span class="step-icon">🔍</span> 중복 확인</div>
    <div class="loading-step" id="step-1"><span class="step-icon">📤</span> 서버 전송</div>
    <div class="loading-step" id="step-2"><span class="step-icon">💾</span> 데이터 저장</div>
    <div class="loading-step" id="step-3"><span class="step-icon">✅</span> 완료</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
